name: Sausage Store Deploy

on:
  push:
    branches:
      - main

env:
  NEXUS_HELM_REPO: ${{ secrets.NEXUS_HELM_REPO }}
  NEXUS_HELM_REPO_USER: ${{ secrets.NEXUS_HELM_REPO_USER }}
  NEXUS_HELM_REPO_PASSWORD: ${{ secrets.NEXUS_HELM_REPO_PASSWORD }}
  SAUSAGE_STORE_NAMESPACE: ${{ secrets.NAMESPACE }}
  KUBE_CONFIG: ${{ secrets.KUBE_CONFIG }}
  HELM_CHART_NAME: sausage-store
  HELM_CHART_VERSION: 0.1.0

jobs:
  build_and_push_to_docker_hub:
    name: Push Docker image to DockerHub
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repo
        uses: actions/checkout@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      - name: Login to Docker
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Push Backend to DockerHub
        uses: docker/build-push-action@v4
        with:
          context: ./backend/
          push: true
          tags: timnekk/sausage-backend:latest
          build-args: |
            VERSION=${{ github.sha }}
      - name: Push Frontend to DockerHub
        uses: docker/build-push-action@v4
        with:
          context: ./frontend/
          push: true
          tags: timnekk/sausage-frontend:latest
      - name: Push Backend-report to DockerHub
        uses: docker/build-push-action@v4
        with:
          context: ./backend-report/
          push: true
          tags: timnekk/sausage-backend-report:latest

  add_helm_chart_to_nexus:
    name: Add Helm Chart To Nexus
    runs-on: ubuntu-latest
    needs: build_and_push_to_docker_hub

    steps:
      - uses: actions/checkout@v3
      - name: Install Helm
        uses: azure/setup-helm@v4
      - name: Build Helm Dependencies
        run: helm dependency build ./sausage-store-chart
      - name: Package Helm chart
        run: helm package ./sausage-store-chart --version "${HELM_CHART_VERSION}"
      - name: Add Nexus Helm Repository
        run: |
          helm repo add nexus "${NEXUS_HELM_REPO}" \
            --username "${NEXUS_HELM_REPO_USER}" \
            --password "${NEXUS_HELM_REPO_PASSWORD}"
          helm repo update
      - name: Push Chart
        run: |
          chart_package="${HELM_CHART_NAME}-${HELM_CHART_VERSION}.tgz"
          repo_url="${NEXUS_HELM_REPO%/}/"
          curl --fail --show-error --location \
            -u "${NEXUS_HELM_REPO_USER}:${NEXUS_HELM_REPO_PASSWORD}" \
            --upload-file "${chart_package}" \
            "${repo_url}"

  deploy_helm_chart_to_kubernetes:
    name: Deploy Helm Chart To Kubernetes
    runs-on: ubuntu-latest
    needs: add_helm_chart_to_nexus

    steps:
      - uses: actions/checkout@v3
      - name: Install Helm
        uses: azure/setup-helm@v4
      - name: Setup kubeconfig
        run: echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > kubeconfig
      - name: Add Nexus Helm Repository
        run: |
          helm repo add nexus "${NEXUS_HELM_REPO}" \
            --username "${NEXUS_HELM_REPO_USER}" \
            --password "${NEXUS_HELM_REPO_PASSWORD}"
      - name: Deploy with Helm
        run: |
          for attempt in {1..6}; do
            helm repo update
            if helm search repo "nexus/${HELM_CHART_NAME}" --version "${HELM_CHART_VERSION}" | grep -q "nexus/${HELM_CHART_NAME}"; then
              break
            fi

            if [ "${attempt}" -eq 6 ]; then
              echo "Chart nexus/${HELM_CHART_NAME} version ${HELM_CHART_VERSION} was not found in the Nexus Helm index."
              helm search repo nexus --versions || true
              exit 1
            fi

            sleep 10
          done

          envsubst < ./sausage-store-chart/values.yaml > ./values-resolved.yaml
          helm upgrade --install sausage-store "nexus/${HELM_CHART_NAME}" \
            --version "${HELM_CHART_VERSION}" \
            --namespace "${SAUSAGE_STORE_NAMESPACE}" \
            --values ./values-resolved.yaml \
            --kubeconfig ./kubeconfig
